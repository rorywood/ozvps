<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>503 - Maintenance Mode | OzVPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: hsl(219, 95%, 7%);
            color: hsl(0, 0%, 95%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            color: hsl(45, 100%, 60%);
            margin-bottom: 1rem;
            text-shadow: 0 0 40px hsla(45, 100%, 60%, 0.3);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: hsl(0, 0%, 95%);
        }

        p {
            font-size: 1.125rem;
            line-height: 1.6;
            color: hsl(215, 20%, 65%);
            margin-bottom: 2rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: hsl(45, 100%, 60%, 0.1);
            border: 1px solid hsl(45, 100%, 60%, 0.3);
            border-radius: 2rem;
            font-size: 0.875rem;
            margin-bottom: 2rem;
            color: hsl(45, 100%, 70%);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: hsl(45, 100%, 60%);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .maintenance-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .maintenance-icon svg {
            width: 100%;
            height: 100%;
            fill: hsl(45, 100%, 60%);
        }

        .info-box {
            background: hsl(219, 30%, 12%);
            border: 1px solid hsl(219, 30%, 18%);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .info-box h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: hsl(0, 0%, 95%);
        }

        .info-box p {
            font-size: 0.875rem;
            margin-bottom: 0;
        }

        @media (max-width: 640px) {
            .error-code {
                font-size: 5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="maintenance-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <div class="status-badge">
            <span class="status-dot"></span>
            <span>Maintenance in Progress</span>
        </div>

        <h1>We'll be back shortly</h1>
        <p>We're performing scheduled maintenance to improve your experience. This usually takes just a few minutes.</p>

        <div class="info-box">
            <h2>What's happening?</h2>
            <p>Our team is deploying updates and improvements to the platform. We appreciate your patience!</p>
        </div>
    </div>
</body>
</html>
