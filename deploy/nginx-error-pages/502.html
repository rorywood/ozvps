<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Unavailable | OzVPS</title>
    <link rel="icon" type="image/png" href="/favicon.ico">
    <script src="https://browser.sentry-cdn.com/7.100.0/bundle.min.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, hsl(222, 47%, 6%) 0%, hsl(220, 50%, 8%) 50%, hsl(222, 47%, 6%) 100%);
            color: hsl(210, 40%, 96%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            background: linear-gradient(145deg, hsla(220, 40%, 13%, 0.8), hsla(220, 40%, 10%, 0.9));
            backdrop-filter: blur(20px);
            border: 1px solid hsla(220, 40%, 25%, 0.3);
            border-radius: 1.5rem;
            padding: 3rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo { display: flex; justify-content: center; margin-bottom: 2.5rem; }
        .logo img { height: 40px; width: auto; filter: brightness(0) invert(1); }

        .error-code {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, hsl(217, 91%, 60%), hsl(199, 89%, 48%));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: hsl(210, 40%, 98%);
        }

        .description {
            font-size: 0.9375rem;
            line-height: 1.6;
            color: hsl(215, 20%, 65%);
            margin-bottom: 2rem;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: 0.625rem;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, hsl(217, 91%, 55%), hsl(217, 91%, 50%));
            color: white;
            box-shadow: 0 4px 14px hsla(217, 91%, 50%, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px hsla(217, 91%, 50%, 0.45);
        }

        .btn-secondary {
            background: hsla(220, 40%, 20%, 0.5);
            border: 1px solid hsla(220, 40%, 30%, 0.5);
            color: hsl(210, 40%, 80%);
        }

        .btn-secondary:hover {
            background: hsla(220, 40%, 25%, 0.5);
            border-color: hsla(220, 40%, 35%, 0.5);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, hsla(220, 40%, 30%, 0.5), transparent);
            margin-bottom: 1.5rem;
        }

        .error-id {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1rem;
            background: hsla(220, 40%, 15%, 0.5);
            border: 1px solid hsla(220, 40%, 25%, 0.3);
            border-radius: 0.5rem;
            font-size: 0.8125rem;
        }

        .error-id-label {
            color: hsl(215, 20%, 55%);
        }

        .error-id-value {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            color: hsl(210, 40%, 80%);
            letter-spacing: 0.02em;
        }

        .copy-btn {
            background: none;
            border: none;
            color: hsl(217, 91%, 60%);
            cursor: pointer;
            padding: 0.25rem;
            margin-left: 0.5rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .copy-btn:hover { opacity: 1; }

        .footer {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid hsla(220, 40%, 25%, 0.3);
            text-align: center;
            font-size: 0.8125rem;
            color: hsl(215, 20%, 50%);
        }

        .footer a {
            color: hsl(217, 91%, 60%);
            text-decoration: none;
        }

        .footer a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .card { padding: 2rem 1.5rem; }
            .error-code { font-size: 3rem; }
            h1 { font-size: 1.25rem; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="/logo.png" alt="OzVPS" onerror="this.style.display='none'">
        </div>

        <div class="error-code">502</div>
        <h1>Temporarily Unavailable</h1>

        <p class="description">
            Our servers are currently being updated or experiencing a brief interruption.
            This typically resolves within a few moments.
        </p>

        <div class="actions">
            <button class="btn btn-primary" onclick="location.reload()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                    <path d="M21 3v5h-5"/>
                </svg>
                Refresh
            </button>
            <a href="https://ozvps.com.au" class="btn btn-secondary">
                Visit Website
            </a>
        </div>

        <div class="divider"></div>

        <div class="error-id">
            <span class="error-id-label">Error Reference</span>
            <span>
                <span class="error-id-value" id="errorId">-</span>
                <button class="copy-btn" onclick="copyErrorId()" title="Copy to clipboard">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                </button>
            </span>
        </div>

        <div class="footer">
            Need help? <a href="mailto:support@ozvps.com.au">Contact Support</a>
        </div>
    </div>

    <script>
        // Generate unique error ID
        const errorId = 'E502-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2, 4).toUpperCase();
        document.getElementById('errorId').textContent = errorId;

        // Initialize Sentry if DSN is configured
        const sentryDsn = '{{SENTRY_DSN}}';
        if (sentryDsn && !sentryDsn.includes('{{')) {
            try {
                Sentry.init({
                    dsn: sentryDsn,
                    environment: window.location.hostname.includes('dev.') ? 'development' : 'production'
                });
                Sentry.captureMessage('NGINX 502 Error', {
                    level: 'error',
                    tags: {
                        error_type: 'nginx_502',
                        error_id: errorId,
                        page_url: window.location.href
                    },
                    extra: {
                        timestamp: new Date().toISOString(),
                        userAgent: navigator.userAgent
                    }
                });
            } catch (e) {
                console.log('Sentry not available');
            }
        }

        function copyErrorId() {
            navigator.clipboard.writeText(errorId).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
                setTimeout(() => {
                    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
                }, 2000);
            });
        }
    </script>
</body>
</html>
