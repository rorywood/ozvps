<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | OzVPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: hsl(219, 95%, 7%);
            color: hsl(0, 0%, 95%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            color: hsl(211, 100%, 50%);
            margin-bottom: 1rem;
            text-shadow: 0 0 40px hsla(211, 100%, 50%, 0.3);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: hsl(0, 0%, 95%);
        }

        p {
            font-size: 1.125rem;
            line-height: 1.6;
            color: hsl(215, 20%, 65%);
            margin-bottom: 2rem;
        }

        .button {
            display: inline-block;
            padding: 0.875rem 2rem;
            background: hsl(211, 100%, 50%);
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
            box-shadow: 0 4px 12px hsla(211, 100%, 50%, 0.3);
        }

        .button:hover {
            background: hsl(211, 100%, 45%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px hsla(211, 100%, 50%, 0.4);
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 2rem;
            filter: invert(1);
        }

        @media (max-width: 640px) {
            .error-code {
                font-size: 5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="/" class="button">Return Home</a>
    </div>
</body>
</html>
